<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Mes Achats</title><style>

body{
background:#f4f6fb;
font-family:Arial,sans-serif;
padding:15px;
}

.logo{
display:block;
margin:auto;
width:220px;
margin-bottom:20px;
}

.retour{
display:block;
padding:12px;
background:#1f5fc3;
color:white;
text-decoration:none;
text-align:center;
border-radius:10px;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.titre{
font-size:20px;
font-weight:bold;
color:#1f5fc3;
margin-bottom:10px;
}

.info{
margin:5px 0;
}

</style></head><body><a href="dashboard.html" class="retour">
⬅ Retour
</a><img src="logomadw.png" class="logo"><div id="liste">
Chargement...
</div><script>

const API =
"https://script.google.com/macros/s/AKfycbxE739OhmpnuOPhWCnRoe8uA2QvUEUP5_8kbLWpoU1m6NVxpiCU9_dkflQMau9r22RPoQ/exec";

charger();

async function charger(){

const userId =
localStorage.getItem("userId");

const response =
await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getAchats",
userId:userId
})
});

const data =
await response.json();

let html="";

if(!data.success){

document.getElementById("liste").innerHTML =
"Aucun achat";
return;

}

data.achats.forEach(a=>{

html += `

<div class="card">

<div class="titre">
${a.type}
</div>

<div class="info">
${a.titreAnnonce || ""}
</div>

<div class="info">
Référence : ${a.referenceId}
</div>

<div class="info">
Montant : ${a.montant} Ar
</div>

<div class="info">
Date : ${a.date}
</div>

</div>

`;

});

document.getElementById("liste").innerHTML =
html;

}

</script></body>
</html>
