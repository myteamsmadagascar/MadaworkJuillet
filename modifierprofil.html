<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Services Madawork</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
color:#222;
}

.header{
background:white;
padding:20px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo{
width:220px;
max-width:90%;
}

.retour{
display:block;
margin:15px;
padding:14px;
background:#1f5fc3;
color:white;
text-decoration:none;
text-align:center;
border-radius:12px;
font-weight:700;
}

.container{
max-width:1300px;
margin:auto;
padding:15px;
}

.titre{
font-size:34px;
font-weight:800;
color:#1f5fc3;
text-align:center;
margin-bottom:8px;
}

.sousTitre{
text-align:center;
color:#666;
margin-bottom:25px;
font-size:16px;
}

.barre{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-bottom:25px;
}

.recherche{
flex:1;
padding:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
}

.filtre{
padding:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
background:white;
min-width:220px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 2px 15px rgba(0,0,0,.08);
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
}

.image{
width:100%;
height:220px;
object-fit:cover;
background:#eee;
}

.contenu{
padding:20px;
}

.categorie{
display:inline-block;
padding:6px 12px;
background:#eef3ff;
color:#1f5fc3;
border-radius:20px;
font-size:13px;
font-weight:700;
margin-bottom:10px;
}

.nom{
font-size:22px;
font-weight:700;
margin-bottom:10px;
color:#222;
}

.description{
color:#666;
line-height:1.7;
margin-bottom:15px;
min-height:90px;
}

.prix{
font-size:28px;
font-weight:800;
color:#00a651;
margin-bottom:15px;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#1f5fc3;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.btn:hover{
background:#17438f;
}

.footer{
margin-top:40px;
background:#111;
color:white;
padding:30px;
text-align:center;
border-radius:20px;
}

.footer h3{
color:#d4af37;
margin-bottom:10px;
}

@media(max-width:768px){

.titre{
font-size:28px;
}

.barre{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="header">

<a href="dashboard.html">

<img
src="logomadw.png"
class="logo">

</a>

</div>

<a
href="dashboard.html"
class="retour">

⬅ Retour au tableau de bord

</a>

<div class="container">

<h1 class="titre">
🛒 Boutique Madawork
</h1>

<div class="sousTitre">

Achetez vos services, badges, formations, tests, annonces et documents professionnels.

</div>

<div class="barre">

<input
type="text"
id="recherche"
class="recherche"
placeholder="Rechercher un service...">

<select
id="categorie"
class="filtre">

<option value="">
Toutes les catégories
</option>

<option value="BADGE">
Badges
</option>

<option value="SERVICE">
Services
</option>

<option value="FORMATION">
Formations
</option>

<option value="TEST">
Tests
</option>

<option value="EMPLOI">
Emplois
</option>

<option value="LOCAL">
Annonces
</option>

<option value="CV">
CV
</option>

</select>

</div>

<div
id="listeServices"
class="grid">

</div>
<script>

const API="https://script.google.com/macros/s/AKfycbxE739OhmpnuOPhWCnRoe8uA2QvUEUP5_8kbLWpoU1m6NVxpiCU9_dkflQMau9r22RPoQ/exec";

let services=[];

window.onload=function(){

chargerServices();

document.getElementById("recherche").addEventListener("input",filtrer);

document.getElementById("categorie").addEventListener("change",filtrer);

};

async function chargerServices(){

try{

const rep=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"getServices"

})

});

const result=await rep.json();

if(!result.success){

alert(result.message);

return;

}

services=result.services||[];

afficherServices(services);

}catch(err){

console.error(err);

alert("Impossible de charger les services.");

}

}

function afficherServices(liste){

const zone=document.getElementById("listeServices");

zone.innerHTML="";

if(liste.length===0){

zone.innerHTML="<h2>Aucun service disponible.</h2>";

return;

}

liste.forEach(service=>{

zone.innerHTML+=`

<div class="card">

<img
class="image"
src="${service.image||'service.png'}">

<div class="contenu">

<div class="categorie">

${service.categorie}

</div>

<div class="nom">

${service.titre}

</div>

<div class="description">

${service.description}

</div>

<div class="prix">

${Number(service.prix).toLocaleString("fr-FR")} Ar

</div>

<button
class="btn"
onclick="acheter('${service.id}')">

🛒 Acheter

</button>

</div>

</div>

`;

});

}

function filtrer(){

const mot=document.getElementById("recherche").value.toLowerCase();

const cat=document.getElementById("categorie").value;

const liste=services.filter(s=>{

const okMot=

s.titre.toLowerCase().includes(mot)

||

(s.description || "").toLowerCase().includes(mot);

const okCat=

cat=="" ||

s.categorie==cat;

return okMot && okCat;

});

afficherServices(liste);

}

function acheter(id){

window.location.href="commande-service.html?id="+id;

}

</script>

</body>

</html>
