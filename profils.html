<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Talents & Profils | Madawork</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
color:#222;
}

.header{
background:white;
padding:20px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo{
width:220px;
max-width:90%;
}

.retour{
display:block;
width:100%;
max-width:1000px;
margin:20px auto 10px;
padding:14px;
background:#1f5fc3;
color:white;
text-decoration:none;
text-align:center;
border-radius:12px;
font-weight:700;
}

.container{
max-width:1200px;
margin:auto;
padding:15px;
}

.hero{
background:white;
border-radius:20px;
padding:25px;
margin-bottom:20px;
box-shadow:0 2px 12px rgba(0,0,0,.08);
text-align:center;
}

.hero h1{
font-size:34px;
color:#1f5fc3;
margin-bottom:10px;
}

.hero p{
color:#666;
line-height:1.6;
}

.filtres{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 2px 12px rgba(0,0,0,.08);
margin-bottom:20px;
}

.input,
.select{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:12px;
font-size:15px;
outline:none;
}

.input:focus,
.select:focus{
border-color:#1f5fc3;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:18px;
}

.profil{
background:white;
border-radius:20px;
padding:18px;
box-shadow:0 2px 12px rgba(0,0,0,.08);
}

.photo{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
display:block;
margin:0 auto 15px;
border:5px solid #eef3fb;
}

.badge{
display:inline-block;
padding:7px 14px;
border-radius:20px;
font-size:12px;
font-weight:700;
margin-bottom:10px;
}

.classique{
background:#ececec;
color:#555;
}

.verifie{
background:#2196f3;
color:white;
}

.premium{
background:#ff9800;
color:white;
}

.expert{
background:#f44336;
color:white;
}

.top{
background:#00b050;
color:white;
}

.nom{
font-size:24px;
font-weight:700;
color:#1f5fc3;
text-align:center;
margin-bottom:5px;
}

.titre{
text-align:center;
font-weight:600;
margin-bottom:15px;
color:#666;
}

.info{
margin:6px 0;
font-size:15px;
}

.protege{
background:#fff6d8;
padding:15px;
border-radius:15px;
text-align:center;
margin:15px 0;
font-weight:600;
color:#8a6500;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
margin-top:10px;
color:white;
}

.apercu{
background:#1f5fc3;
}

.debloquer{
background:#ff9800;
}

.badgeBtn{
background:#673ab7;
}

.recruter{
background:#00b050;
}

.signaler{
background:#e53935;
}

</style>

</head>

<body>

<div class="header">

<a href="dashboard.html">

<img src="logomadw.png" class="logo">

</a>

</div>

<a href="dashboard.html" class="retour">

⬅ Retour au tableau de bord

</a>

<div class="container">

<div class="hero">

<h1>Talents & Profils</h1>

<p>

Découvrez des candidats qualifiés dans tous les domaines.

Les coordonnées,et CV seront masqués jusqu'au déblocage du profil.

</p>

</div>
<div class="filtres">

<input
type="text"
id="recherche"
class="input"
placeholder="Métier, compétence, domaine, langue, ville...">

<select
id="categorie"
class="select">

<option value="">
Toutes les catégories
</option>

<option>Assistant virtuel</option>
<option>Service Client</option>
<option>Téléprospection</option>
<option>Commercial</option>
<option>Informatique</option>
<option>Développement Web</option>
<option>Graphisme</option>
<option>Marketing</option>
<option>Community Manager</option>
<option>Comptabilité</option>
<option>RH</option>
<option>Traduction</option>
<option>Rédaction</option>
<option>Formation</option>
<option>Autres</option>

</select>

<select
id="domaine"
class="select">

<option value="">
Tous les domaines
</option>

<option>Administration</option>
<option>Centre d'appel</option>
<option>Commerce</option>
<option>Banque</option>
<option>Santé</option>
<option>BTP</option>
<option>Éducation</option>
<option>Tourisme</option>
<option>Transport</option>
<option>Industrie</option>
<option>Agriculture</option>
<option>Informatique</option>
<option>Immobilier</option>
<option>Autres</option>

</select>

<select
id="badge"
class="select">

<option value="">
Tous les badges
</option>

<option value="TOP TALENT">
🥇 Top Talent
</option>

<option value="EXPERT">
🔴 Expert
</option>

<option value="PREMIUM">
🟠 Premium
</option>

<option value="VERIFIE">
🔵 Vérifié
</option>

<option value="STANDARD">
⚪ Standard
</option>

</select>

<input
type="text"
id="ville"
class="input"
placeholder="Ville">

</div>

<div
id="listeProfils"
class="grid">

Chargement...

</div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxE739OhmpnuOPhWCnRoe8uA2QvUEUP5_8kbLWpoU1m6NVxpiCU9_dkflQMau9r22RPoQ/exec";

let profils=[];

const synonymes={

assistant:[
"assistant",
"assistant virtuel",
"secrétaire"
],

commercial:[
"commercial",
"vente",
"téléprospection",
"business developer"
],

informatique:[
"informatique",
"développeur",
"developpeur",
"web",
"application",
"ia"
],

centreappel:[
"centre d'appel",
"service client",
"téléconseiller",
"call center"
]

};

chargerProfils();
function badgeOrdre(badge){

switch((badge||"").toUpperCase()){

case "TOP TALENT":
return 1;

case "TOP_TALENT":
return 1;

case "EXPERT":
return 2;

case "PREMIUM":
return 3;

case "VERIFIE":
return 4;

default:
return 5;

}

}

function badgeHtml(badge){

switch((badge||"").toUpperCase()){

case "TOP TALENT":
case "TOP_TALENT":
return '<span class="badge top">🥇 TOP TALENT</span>';

case "EXPERT":
return '<span class="badge expert">🔴 EXPERT</span>';

case "PREMIUM":
return '<span class="badge premium">🟠 PREMIUM</span>';

case "VERIFIE":
return '<span class="badge verifie">🔵 VÉRIFIÉ</span>';

default:
return '<span class="badge classique">⚪ STANDARD</span>';

}

}

async function chargerProfils(){

const zone =
document.getElementById("listeProfils");

try{

const rep =
await fetch(API,{

method:"POST",

body:JSON.stringify({

action:"getProfils"

})

});

const data =
await rep.json();

if(!data.success){

zone.innerHTML =
"Aucun profil disponible.";

return;

}

profils =
data.profils || [];

profils.sort((a,b)=>

badgeOrdre(a.badge)
-
badgeOrdre(b.badge)

);

afficherProfils(profils);

}catch(err){

zone.innerHTML =
"Erreur de chargement.";

}

}

function afficherProfils(liste){

const zone =
document.getElementById("listeProfils");

if(liste.length===0){

zone.innerHTML =
"Aucun profil trouvé.";

return;

}

let html="";

liste.forEach(p=>{

html+=`

<div class="profil">

${badgeHtml(p.badge)}

<img
src="${p.photo || 'exempleprofil.png'}"
class="photo"
onerror="this.src='exempleprofil.png'">

<div class="nom">

${p.nomComplet || ""}

</div>

<div class="titre">

${p.titreProfil || ""}

</div>

<div class="info">
📂 ${p.categorie || ""}
</div>

<div class="info">
🏢 ${p.domaine || ""}
</div>

<div class="info">
📍 ${p.ville || ""}
</div>

<div class="info">
👁 ${p.vues || 0} vues
</div>

<div class="info">
🟢 ${p.disponibilite || ""}
</div>

<div class="protege">

📞 Coordonnées protégées<br>

📧 Email protégé<br>

📄 CV protégé

</div>


<button
class="btn debloquer"
onclick="debloquerProfil('${p.id}')">

🔓 Débloquer 👁le CV du profil
(${Number(p.prixDeblocage||0).toLocaleString("fr-FR")} Ar)

</button>

<button
class="btn recruter"
onclick="recruter('${p.id}')">

🤝 Recruter via Madawork

</button>

<button
class="btn signaler"
onclick="signaler('${p.id}')">

🚩 Signaler

</button>

</div>

`;

});

zone.innerHTML=html;

}
function rechercher(){

const mot = document.getElementById("recherche").value.toLowerCase().trim();
const categorie = document.getElementById("categorie").value.toLowerCase();
const domaine = document.getElementById("domaine").value.toLowerCase();
const badge = document.getElementById("badge").value.toUpperCase();
const ville = document.getElementById("ville").value.toLowerCase();

const resultat = profils.filter(function(p){

const texte = (
(p.nomComplet||"")+" "+
(p.titreProfil||"")+" "+
(p.presentation||"")+" "+
(p.categorie||"")+" "+
(p.domaine||"")+" "+
(p.ville||"")+" "+
(p.langues||"")
).toLowerCase();

if(mot && !texte.includes(mot)) return false;

if(categorie && (p.categorie||"").toLowerCase()!=categorie) return false;

if(domaine && (p.domaine||"").toLowerCase()!=domaine) return false;

if(ville && !(p.ville||"").toLowerCase().includes(ville)) return false;

if(badge){

const b = (p.badge||"").toUpperCase().replace("_"," ");

if(b!=badge) return false;

}

return true;

});

afficherProfils(resultat);

}

document
.getElementById("recherche")
.addEventListener(
"keyup",
rechercher
);

document
.getElementById("categorie")
.addEventListener(
"change",
rechercher
);

document
.getElementById("domaine")
.addEventListener(
"change",
rechercher
);

document
.getElementById("badge")
.addEventListener(
"change",
rechercher
);

document
.getElementById("ville")
.addEventListener(
"keyup",
rechercher
);

function voirProfil(id){
alert(id);
window.location.href=
"profil.html?id="+id;

}

function debloquerProfil(id){

window.location.href=
"profil.html?id="+id;

}

function recruter(id){

window.location.href=
"contact.html?profil="+id;

}

function signaler(id){

window.location.href=
"mailto:bureau@madawork.com?subject=Signalement%20profil%20"+id;

}

</script>

</body>

</html>
